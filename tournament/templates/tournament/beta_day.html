{% extends 'tournament/base.html' %}
{% load static %}

{% block title %}BETA - Дневная фаза — Раунд {{ round_num }}{% endblock %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/pages/beta_day.css' %}?v=3">
{% endblock %}

{% block extra_js %}
    <script src="{% static 'js/pages/beta_day.js' %}?v=3" defer></script>
{% endblock %}

{% block content %}
<div class="day-container">
    <div class="day-header">
        <h2><i class="fas fa-sun"></i> Дневная фаза — Раунд {{ round_num }}</h2>
        <button onclick="resetToSetup()" class="btn-outline">
            <i class="fas fa-home"></i> Новая игра
        </button>
    </div>
    
    <div class="eliminated-info" id="eliminatedInfo"></div>
    
    <div class="mode-buttons">
        <button id="foulModeBtn" class="mode-btn foul-mode" onclick="setMode('foul')">⚠️ Фолы</button>
        <button id="nominateModeBtn" class="mode-btn nominate-mode" onclick="setMode('nominate')">🎙️ Выставление</button>
    </div>
    
    <div class="current-mode-info" id="modeInfo">
        <i class="fas fa-info-circle"></i> Выберите режим
    </div>
    
    <div class="action-buttons">
        <button onclick="goToVoting()" class="vote-btn">
            <i class="fas fa-vote-yea"></i> Голосование (выбывание)
        </button>
        <button onclick="goToNightNoElimination()" class="night-skip-btn">
            <i class="fas fa-moon"></i> Перейти в ночь (без выбывания)
        </button>
    </div>
    
    <div class="players-list" id="playersContainer"></div>
    
    <div class="logs-box">
        <div id="logsList"></div>
    </div>
    
    <button onclick="endGame()" class="btn-outline" style="margin-top: 10px; width: 100%; color: #ef4444;">
        <i class="fas fa-flag-checkered"></i> Завершить игру
    </button>
</div>

<script>
    window.roundNumber = { round_num };
</script>
{% endblock %}
