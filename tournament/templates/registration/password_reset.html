{% extends 'tournament/base.html' %}
{% load static %}

{% block title %}Восстановление пароля - Project Omerta{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-header-icon">
                <i class="fas fa-key"></i>
            </div>
            <h2>Восстановление пароля</h2>
            <p>Введите email, указанный при регистрации</p>
        </div>
        
        <div class="auth-body">
            <form method="post">
                {% csrf_token %}
                
                <div class="form-group">
                    <label><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" name="email" class="form-control" required autofocus>
                </div>
                
                <button type="submit" class="auth-btn">
                    <span>Отправить инструкцию</span>
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
            
            <div class="auth-footer">
                <p><a href="{% url 'login' %}">Вернуться ко входу</a></p>
            </div>
        </div>
    </div>
</div>

<style>
    .auth-container {
        min-height: calc(100vh - 150px);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
    }
    .auth-card {
        max-width: 450px;
        width: 100%;
        background: linear-gradient(145deg, var(--bg-card), #1a1a1a);
        border: 1px solid var(--border-color);
        border-radius: 32px;
    }
    .auth-header {
        background: linear-gradient(135deg, rgba(212, 175, 55, 0.15), transparent);
        padding: 30px 25px 20px;
        text-align: center;
    }
    .auth-header-icon {
        width: 70px;
        height: 70px;
        margin: 0 auto 15px;
        background: linear-gradient(135deg, var(--gold), var(--gold-dark));
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .auth-header-icon i {
        font-size: 2rem;
        color: var(--bg-primary);
    }
    .auth-header h2 {
        font-size: 1.5rem;
        color: var(--text-primary);
    }
    .auth-header p {
        color: var(--text-secondary);
        font-size: 0.8rem;
    }
    .auth-body {
        padding: 25px;
    }
    .form-group {
        margin-bottom: 20px;
    }
    .form-group label {
        display: block;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--gold);
        margin-bottom: 8px;
    }
    .form-control {
        width: 100%;
        padding: 12px 15px;
        background: var(--bg-primary);
        border: 1px solid var(--border-color);
        border-radius: 14px;
        color: var(--text-primary);
        font-size: 0.9rem;
    }
    .form-control:focus {
        outline: none;
        border-color: var(--gold);
    }
    .auth-btn {
        width: 100%;
        padding: 12px 20px;
        background: linear-gradient(135deg, var(--gold), var(--gold-dark));
        border: none;
        border-radius: 30px;
        color: var(--bg-primary);
        font-weight: 700;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
    }
    .auth-btn:hover {
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(212, 175, 55, 0.4);
    }
    .auth-footer {
        margin-top: 20px;
        text-align: center;
        font-size: 0.8rem;
    }
    .auth-footer a {
        color: var(--gold);
        text-decoration: none;
    }
</style>
{% endblock %}
