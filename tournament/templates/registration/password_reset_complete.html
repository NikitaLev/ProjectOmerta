{% extends 'tournament/base.html' %}
{% load static %}

{% block title %}Пароль изменён - Project Omerta{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-header-icon">
                <i class="fas fa-check-circle"></i>
            </div>
            <h2>Пароль изменён</h2>
            <p>Ваш пароль успешно обновлён</p>
        </div>
        
        <div class="auth-body">
            <div class="success-message">
                <i class="fas fa-check-circle"></i>
                <p>Теперь вы можете войти в систему, используя новый пароль.</p>
            </div>
            
            <div class="auth-footer">
                <a href="{% url 'login' %}" class="auth-btn">
                    <i class="fas fa-sign-in-alt"></i> Войти в систему
                </a>
            </div>
        </div>
    </div>
</div>

<style>
    .success-message {
        background: rgba(74, 222, 128, 0.1);
        border: 1px solid rgba(74, 222, 128, 0.3);
        border-radius: 12px;
        padding: 15px;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 25px;
    }
    .success-message i {
        font-size: 1.2rem;
        color: #4ade80;
    }
    .success-message p {
        margin: 0;
        font-size: 0.8rem;
        color: #4ade80;
    }
    .auth-footer .auth-btn {
        display: inline-block;
        text-decoration: none;
        text-align: center;
    }
</style>
{% endblock %}
